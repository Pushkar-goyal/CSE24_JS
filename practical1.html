<!DOCTYPE html>
<html>
<head>
<title>Student Result</title>

<style>
body{
    font-family: Arial;
    background-color: #f0f8ff;
    text-align: center;
}

.container{
    width: 350px;
    margin: auto;
    margin-top: 80px;
    padding: 20px;
    background: white;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
}

button{
    padding: 8px 15px;
    background-color: green;
    color: white;
    border: none;
    cursor: pointer;
}

#output{
    margin-top: 20px;
    font-size: 18px;
}
</style>

</head>

<body>

<div class="container">

<h2>Student Result Calculator</h2>

<button onclick="calculate()">Enter Marks</button>

<div id="output"></div>

</div>

<script>

function calculate(){

let subjects = parseInt(prompt("Enter number of subjects:"));

let total = 0;
let marks;

for(let i=1; i<=subjects; i++)
{
    marks = parseInt(prompt("Enter marks of subject " + i));
    total = total + marks;
}

let average = total / subjects;

let grade;
let result;

if(average >= 90)
grade = "A+";

else if(average >= 75)
grade = "A";

else if(average >= 60)
grade = "B";

else if(average >= 50)
grade = "C";

else
grade = "F";

if(average >= 40)
result = "PASS";
else
result = "FAIL";

document.getElementById("output").innerHTML =
"Total Marks: " + total + "<br>" +
"Average Marks: " + average + "<br>" +
"Grade: " + grade + "<br>" +
"Result: " + result;

}

</script>

</body>
</html>
